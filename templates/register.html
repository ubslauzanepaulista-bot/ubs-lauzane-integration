<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>📊 Agendamentos</h2>

<a href="/enviar" class="btn btn-success mb-3">📲 Enviar Mensagens</a>

<table class="table table-bordered">
<tr>
<th>Nome</th>
<th>Especialidade</th>
<th>Data</th>
<th>Status</th>
</tr>

{% for row in dados %}
<tr>
<td>{{ row.Nome }}</td>
<td>{{ row.Especialidade }}</td>
<td>{{ row.Data }}</td>
<td>{{ row.Status }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
